<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meccha Camouflage</title>
  <link rel="icon" href="icon.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="workspace">
    <section class="column">
      <section class="panel panel-fill corner-accent">
        <div class="panel-title">
          <span data-i18n="settings">Settings</span>
        </div>

        <div class="panel-scroll">
          <div class="panel-content settings-stack">
            <div class="group">
            <div class="group-title" data-i18n="group.geometry">Geometry</div>
            <div class="setting-grid">
              <label class="field">
                <span data-i18n="brush.size">Brush size</span>
                <div class="range-row">
                  <input id="brush-size" class="setting-control" disabled type="range" min="1" max="12" step="0.5">
                  <input id="brush-size-number" class="setting-control range-number" disabled type="number" min="1" max="12" step="0.5">
                </div>
              </label>
              <label class="field">
                <span data-i18n="batch.delay">Batch delay (ms)</span>
                <div class="range-row">
                  <input id="stroke-delay" class="setting-control" disabled type="range" min="1" max="500" step="1">
                  <input id="stroke-delay-number" class="setting-control range-number" disabled type="number" min="1" max="500" step="1">
                </div>
              </label>
              <label class="field app-wide">
                <span data-i18n="batch.size">Batch size</span>
                <div class="range-row">
                  <input id="batch-size" class="setting-control" disabled type="range" min="1" max="100" step="1">
                  <input id="batch-size-number" class="setting-control range-number" disabled type="number" min="1" max="100" step="1">
                </div>
              </label>
            </div>
          </div>

            <div class="group">
            <div class="group-title" data-i18n="group.material">Material</div>
            <div class="setting-grid">
              <label class="field app-wide">
                <span data-i18n="auto.material">Auto Detect</span>
                <div class="checkbox-row">
                  <input id="auto-material" class="setting-control" disabled type="checkbox">
                </div>
              </label>
              <label class="field">
                <span data-i18n="metallic">Metallic</span>
                <div class="range-row">
                  <input id="metallic" class="setting-control" disabled type="range" min="0" max="1" step="0.01">
                  <input id="metallic-number" class="setting-control range-number" disabled type="number" min="0" max="1" step="0.01">
                </div>
              </label>
              <label class="field">
                <span data-i18n="roughness">Roughness</span>
                <div class="range-row">
                  <input id="roughness" class="setting-control" disabled type="range" min="0" max="1" step="0.01">
                  <input id="roughness-number" class="setting-control range-number" disabled type="number" min="0" max="1" step="0.01">
                </div>
              </label>
            </div>
          </div>

            <div class="group">
              <div class="group-title" data-i18n="regions">Regions</div>
              <div class="region-grid">
                <strong data-i18n="region.back">Back</strong>
                <div class="region-choice" data-region="paint.backRegionMode"></div>
                <strong data-i18n="region.sides">Sides</strong>
                <div class="region-choice" data-region="paint.sideRegionMode"></div>
                <strong data-i18n="region.front">Front</strong>
                <div class="region-choice" data-region="paint.frontRegionMode"></div>
              </div>
            </div>

            <div class="group" id="fill-section">
            <div class="group-title" data-i18n="mode.fill">Fill</div>
            <div class="setting-grid">
              <label class="field app-wide">
                <span data-i18n="fill.color">Color</span>
                <div class="color-row">
                  <input id="fill-color-picker" class="setting-control color-picker" disabled type="color">
                  <input id="fill-color" class="setting-control mono-input" disabled type="text" spellcheck="false" placeholder="#FFFFFF">
                </div>
              </label>
              <label class="field">
                <span data-i18n="metallic">Metallic</span>
                <div class="range-row">
                  <input id="fill-metallic" class="setting-control" disabled type="range" min="0" max="1" step="0.01">
                  <input id="fill-metallic-number" class="setting-control range-number" disabled type="number" min="0" max="1" step="0.01">
                </div>
              </label>
              <label class="field">
                <span data-i18n="roughness">Roughness</span>
                <div class="range-row">
                  <input id="fill-roughness" class="setting-control" disabled type="range" min="0" max="1" step="0.01">
                  <input id="fill-roughness-number" class="setting-control range-number" disabled type="number" min="0" max="1" step="0.01">
                </div>
              </label>
            </div>
          </div>
          </div>

          <div class="sub-panel">
            <div class="setting-grid app-grid">
              <label class="field app-wide">
                <span data-i18n="language">Language</span>
                <div class="select-wrap">
                  <select id="language" class="setting-control mono-input" disabled></select>
                </div>
              </label>
              <label class="field app-wide">
                <span data-i18n="theme.color">Theme color</span>
                <div class="color-row">
                  <input id="theme-color-picker" class="setting-control color-picker" disabled type="color">
                  <input id="theme-color" class="setting-control mono-input" disabled type="text" spellcheck="false" placeholder="#FFFFFF">
                </div>
              </label>
              <label class="field">
                <span data-i18n="always.on.top">Always on top</span>
                <div class="checkbox-row">
                  <input id="always-on-top" class="setting-control" disabled type="checkbox">
                </div>
              </label>
              <label class="field">
                <span data-i18n="opacity">Opacity (%)</span>
                <div class="range-row">
                  <input id="opacity" class="setting-control" disabled type="range" min="35" max="100" step="1">
                  <input id="opacity-number" class="setting-control range-number" disabled type="number" min="35" max="100" step="1">
                </div>
              </label>
              <div class="hotkey-list app-wide">
                <div class="hotkey-row">
                  <span data-i18n="start.hotkey">Start hotkey</span>
                  <input id="start-hotkey" class="setting-control mono-input" disabled type="text" readonly>
                  <button class="record-hotkey" type="button" disabled data-hotkey-key="app.startHotkey" data-hotkey-input="start-hotkey" data-i18n="button.record">Record</button>
                </div>
                <div class="hotkey-row">
                  <span data-i18n="preview.hotkey">Preview hotkey</span>
                  <input id="preview-hotkey" class="setting-control mono-input" disabled type="text" readonly>
                  <button class="record-hotkey" type="button" disabled data-hotkey-key="app.previewHotkey" data-hotkey-input="preview-hotkey" data-i18n="button.record">Record</button>
                </div>
                <div class="hotkey-row">
                  <span data-i18n="unpreview.hotkey">UnPreview hotkey</span>
                  <input id="unpreview-hotkey" class="setting-control mono-input" disabled type="text" readonly>
                  <button class="record-hotkey" type="button" disabled data-hotkey-key="app.unpreviewHotkey" data-hotkey-input="unpreview-hotkey" data-i18n="button.record">Record</button>
                </div>
                <div class="hotkey-row">
                  <span data-i18n="stop.hotkey">Stop hotkey</span>
                  <input id="stop-hotkey" class="setting-control mono-input" disabled type="text" readonly>
                  <button class="record-hotkey" type="button" disabled data-hotkey-key="app.stopHotkey" data-hotkey-input="stop-hotkey" data-i18n="button.record">Record</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="action-bar">
          <button id="reset-settings" type="button" disabled data-i18n="button.reset">Reset</button>
          <button id="cancel-edit" type="button" disabled data-i18n="button.cancel">Cancel</button>
          <button id="edit-settings" type="button" data-i18n="button.edit">Edit</button>
          <button id="save-settings" class="primary" type="button" disabled data-i18n="button.save">Save</button>
        </div>
      </section>
    </section>

    <section class="column">
      <section class="metric-row">
        <div class="metric-card">
          <span data-i18n="metric.progress">Progress</span>
          <strong id="runtime-progress">0%</strong>
        </div>
        <div class="metric-card">
          <span data-i18n="metric.eta">ETA</span>
          <strong id="runtime-eta">-</strong>
        </div>
        <div class="metric-card">
          <span data-i18n="metric.elapsed">Elapsed</span>
          <strong id="runtime-elapsed">-</strong>
        </div>
      </section>

      <section class="log-panel">
        <div class="log-tabs">
          <div class="tabs" role="tablist" aria-label="Log level" data-i18n-aria-label="log.level">
            <button class="tab active" type="button" data-log-filter="all" data-i18n="log.all">All</button>
            <button class="tab" type="button" data-log-filter="info" data-i18n="log.info">Info</button>
            <button class="tab" type="button" data-log-filter="warn" data-i18n="log.warn">Warn</button>
            <button class="tab" type="button" data-log-filter="error" data-i18n="log.error">Error</button>
          </div>
          <div class="log-actions">
            <button id="open-logs" type="button" data-i18n="button.open.logs">Open Logs</button>
            <button id="copy-logs" type="button" data-i18n="button.copy.all">Copy All</button>
          </div>
        </div>
        <pre id="logs" class="logs">No logs yet.</pre>
        <div id="toast" role="status" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <footer class="footer">
    <div>
      <span><span data-i18n="footer.game">GAME</span>: <b id="footer-process" class="status-token">-</b></span>
      <span>|</span>
      <span><span data-i18n="footer.bridge">BRIDGE</span>: <b id="footer-bridge" class="status-token">-</b></span>
    </div>
    <div>
      <a href="https://github.com/acentrist/MecchaCamouflage/blob/main/LICENSE.txt" data-i18n="link.license">License</a>
      <span>|</span>
      <a href="https://github.com/acentrist/MecchaCamouflage" data-i18n="link.github">GitHub</a>
      <span>|</span>
      <span id="version">dev</span>
    </div>
  </footer>

  <div id="hotkey-dialog" class="hotkey-dialog" hidden>
    <div class="hotkey-card">
      <strong data-i18n="dialog.hotkey.title">Press a function key</strong>
      <span id="hotkey-dialog-message" data-i18n="dialog.hotkey.supported">F1-F24 are supported.</span>
      <span class="hotkey-help" data-i18n="dialog.hotkey.cancel">Esc to cancel.</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

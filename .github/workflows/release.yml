name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 1.0.0"
        required: false
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          $version = $version.TrimStart("v")
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build runtime
        shell: pwsh
        run: .\scripts\build_runtime.ps1

      - name: Package
        shell: pwsh
        run: .\scripts\package_release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Write release notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".build" | Out-Null
          @"
          # Meccha Camouflage ${{ steps.version.outputs.version }}

          This release focuses on a simple, stable front-facing camouflage workflow.

          Requested experimental features were removed from the default runtime because they were not stable enough for release. The current build intentionally keeps the workflow small: launch the executable, wait for it to attach to the game process, then press F10.

          Usage:
          1. Start MECCHA CHAMELEON.
          2. Start `meccha-camouflage.exe`.
          3. Wait until the terminal shows `waiting for user to press F10...`.
          4. Press F10 to apply the camouflage.

          The executable automatically finds `PenguinHotel-Win64-Shipping.exe` and injects the runtime bridge. No Python environment is required.
          "@ | Set-Content -Path ".build/release-notes.md" -Encoding UTF8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meccha-camouflage
          path: |
            .build/bin/meccha-camouflage.exe
            .build/package/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: .build/release-notes.md
          files: |
            .build/bin/meccha-camouflage.exe
            .build/package/*.zip

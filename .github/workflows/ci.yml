name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build runtime
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Build artifact checks
        shell: pwsh
        run: |
          if (-not (Test-Path ".build/bin/meccha-camouflage.exe")) { throw "runtime exe missing" }

      - name: Package dry run
        shell: pwsh
        run: |
          $version = "ci-$env:GITHUB_RUN_NUMBER"
          .\scripts\release.ps1 -Version $version
          $exePath = ".build/package/meccha-camouflage-$version.exe"
          if (-not (Test-Path $exePath)) { throw "package exe missing" }
          if ((Get-Item $exePath).Length -le 10000000) { throw "package exe is unexpectedly small" }
